name: Build Firmware

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:
    branches: ["**"]

permissions:
  contents: write

jobs:
  build:
    name: Compile (genericSTM32F103T6)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache PlatformIO packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio/.cache
            ~/.platformio/packages
            ~/.platformio/platforms
          key: pio-${{ runner.os }}-${{ hashFiles('platformio.ini') }}
          restore-keys: pio-${{ runner.os }}-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PlatformIO
        run: pip install --upgrade platformio

      - name: Build firmware
        run: pio run -e genericSTM32F103T6

      # ── Collect artefacts ────────────────────────────────────────────────────
      # PlatformIO writes firmware.bin and firmware.elf to
      # .pio/build/<env>/.  Both are uploaded so that the .elf can be
      # used for debugging and the .bin can be flashed directly.

      - name: Stage firmware files
        run: |
          mkdir -p dist
          cp .pio/build/genericSTM32F103T6/firmware.bin dist/firmware.bin
          cp .pio/build/genericSTM32F103T6/firmware.elf dist/firmware.elf

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ github.sha }}
          path: dist/
          retention-days: 14

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/firmware.bin
            dist/firmware.elf
          generate_release_notes: true
